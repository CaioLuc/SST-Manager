version: "3.9"

services:
  # ==========================================
  # Serviço de Banco de Dados MySQL
  # ==========================================
  mysql:
    image: mysql:8.0
    container_name: sst_manager_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-sua_senha}
      MYSQL_DATABASE: ${DB_NAME:-sst_manager}
    ports:
      - "3306:3306"
    volumes:
      - sst_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Serviço de Cache / Fila Redis
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: sst_manager_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - sst_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Serviço da API Backend (FastAPI / Python)
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sst_manager_api
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ==========================================
  # Serviço de Reverse Proxy (Nginx)
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: sst_manager_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

# Volumes persistentes para dados do MySQL e Redis
volumes:
  sst_mysql_data:
  sst_redis_data:
